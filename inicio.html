<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan Medicine - Login</title>
    <link rel="stylesheet" href="inicio.css">
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>Scan Medicine</h1>
            <p>Seus medicamentos, sempre organizados</p>
        </header>

        <div class="form-box">
            <div class="tabs">
                <button id="tab-entrar" class="tab-btn active" onclick="switchTab('entrar')">Entrar</button>
                <button id="tab-registrar" class="tab-btn" onclick="switchTab('registrar')">Registrar</button>
            </div>

            <form id="form-entrar" class="form-content active">
                <div class="input-group">
                    <label for="email-login">Email</label>
                    <input type="email" id="email-login" placeholder="seu@email.com" required>
                </div>
                <div class="input-group">
                    <label for="senha-login">Senha</label>
                    <input type="password" id="senha-login" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">
                    Entrar
                </button>
            </form>

            <form id="form-registrar" class="form-content">
                <div class="input-group">
                    <label for="email-register">Criar Email</label>
                    <input type="email" id="email-register" placeholder="seu@email.com" required>
                </div>
                <div class="input-group">
                    <label for="senha-register">Criar Senha</label>
                    <input type="password" id="senha-register" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">
                    Cadastrar
                </button>
            </form>
        </div>

        <footer class="footer">
            <p>Ao continuar, você concorda com nossos <a href="termos.html">Termos de Uso</a></p>
        </footer>
    </div>

    <script src="inicio.js"></script>
</body>
</html>
